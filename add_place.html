<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>新增地點 | Tokyo 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "M PLUS Rounded 1c", sans-serif; background-color: #FDFCF8; color: #2B2D42; }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(#E8E8E8 1.5px, transparent 1.5px); background-size: 24px 24px; z-index: -1; pointer-events: none; }
  </style>
</head>
<body class="min-h-screen p-4 relative z-10">
  <header class="flex items-center mb-6 pt-4">
    <a href="index.html" class="bg-white border-2 border-[#2B2D42] shadow-[2px_2px_0px_0px_#2B2D42] w-10 h-10 rounded-xl flex items-center justify-center text-[#2B2D42] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">
      <i class="fa-solid fa-chevron-left text-xl"></i>
    </a>
    <h1 class="text-xl font-black ml-4">新增景點 / 美食</h1>
  </header>

  <main class="bg-white border-2 border-[#2B2D42] shadow-[3px_3px_0px_0px_#2B2D42] rounded-2xl p-5 space-y-5">
    <div>
      <label class="block text-xs font-black text-[#2B2D42] mb-2">📍 地點名稱</label>
      <input type="text" id="inp-title" placeholder="例：敘敘苑 晴空塔店" class="w-full bg-gray-50 border-2 border-[#2B2D42] rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
    </div>
    <div class="flex gap-3">
        <div class="w-1/2">
            <label class="block text-xs font-black text-[#2B2D42] mb-2">🏷️ 分類</label>
            <select id="inp-category" class="w-full bg-gray-50 border-2 border-[#2B2D42] rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
                <option value="景點">景點</option><option value="美食">美食</option><option value="逛街">逛街</option><option value="其他">其他</option>
            </select>
        </div>
        <div class="w-1/2">
            <label class="block text-xs font-black text-[#2B2D42] mb-2">📅 預計在哪天？</label>
            <select id="inp-day" class="w-full bg-gray-50 border-2 border-[#2B2D42] rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
                <option value="1">Day 1</option><option value="2">Day 2</option><option value="3">Day 3</option><option value="4">Day 4</option><option value="5">Day 5</option><option value="6">Day 6</option><option value="未分類">尚未決定</option>
            </select>
        </div>
    </div>
    <div>
      <label class="block text-xs font-black text-[#2B2D42] mb-2">🗺️ Google Maps 連結</label>
      <input type="url" id="inp-maplink" placeholder="貼上地圖分享網址" class="w-full bg-gray-50 border-2 border-[#2B2D42] rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
    </div>
    <div class="flex gap-3">
        <div class="w-1/3">
            <label class="block text-xs font-black text-[#2B2D42] mb-2">⭐ Google評分</label>
            <input type="text" id="inp-rating" placeholder="例: 4.5" class="w-full bg-yellow-50 border-2 border-[#2B2D42] rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
        </div>
        <div class="w-2/3">
            <label class="block text-xs font-black text-[#2B2D42] mb-2">📝 補充欄位 (營業時間/短評)</label>
            <input type="text" id="inp-notes" placeholder="例: 營業至21:00，必點和牛" class="w-full bg-gray-50 border-2 border-[#2B2D42] rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
        </div>
    </div>
    <button id="submit-btn" onclick="submitPlace()" class="w-full bg-[#06D6A0] text-white border-2 border-[#2B2D42] shadow-[2px_2px_0px_0px_#2B2D42] rounded-xl py-4 font-black text-base mt-2 active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">
      <i class="fa-solid fa-paper-plane mr-2"></i>新增至行程地圖
    </button>
  </main>
  
  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOxnbns2WDdgF8uXtkz2cd2KycdBXRSCxhGlUzErA1HyeE1Xjl6H6TR3YP0Zxl1zKL/exec"; 
    function submitPlace() {
        const title = document.getElementById('inp-title').value.trim();
        if (!title) return alert("名稱一定要填寫喔！");
        const btn = document.getElementById('submit-btn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>傳送中...'; btn.disabled = true;
        const params = new URLSearchParams({
            action: 'add', target_sheet: 'place', title: title,
            category: document.getElementById('inp-category').value,
            day: document.getElementById('inp-day').value,
            maplink: document.getElementById('inp-maplink').value.trim(),
            rating: document.getElementById('inp-rating').value.trim(),
            notes: document.getElementById('inp-notes').value.trim()
        });
        fetch(SCRIPT_URL + "?" + params.toString(), { method: 'GET', mode: 'no-cors' })
        .then(() => { setTimeout(() => { window.location.href = "index.html"; }, 1000); });
    }
  </script>
</body>
</html>
