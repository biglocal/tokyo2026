<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>新增公帳明細 | Tokyo 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"M PLUS Rounded 1c"', 'sans-serif'] },
          colors: { draw: { bg: '#FDFCF8', ink: '#2B2D42', yellow: '#FFD166', pink: '#EF476F', blue: '#118AB2', green: '#06D6A0', muted: '#6C757D' } },
          boxShadow: { 'solid': '3px 3px 0px 0px #2B2D42', 'solid-sm': '2px 2px 0px 0px #2B2D42' }
        }
      }
    }
  </script>
  <style>
    body { background-color: #FDFCF8; color: #2B2D42; }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(#E8E8E8 1.5px, transparent 1.5px); background-size: 24px 24px; z-index: -1; pointer-events: none; }
    .click-effect { transition: transform 0.1s, box-shadow 0.1s; }
    .click-effect:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px 0px #2B2D42 !important; }
  </style>
</head>
<body class="font-sans min-h-screen p-4 relative z-10">

  <header class="flex items-center mb-6 pt-4">
    <a href="index.html" class="bg-white border-2 border-draw-ink shadow-solid-sm w-10 h-10 rounded-xl flex items-center justify-center text-draw-ink click-effect">
      <i class="fa-solid fa-chevron-left text-xl"></i>
    </a>
    <h1 class="text-xl font-black ml-4">記一筆公帳</h1>
  </header>

  <main class="bg-white border-2 border-draw-ink shadow-solid rounded-2xl p-5 space-y-5">
    
    <div>
      <label class="block text-xs font-black text-draw-ink mb-2">🏷️ 類別 (Category)</label>
      <select id="inp-category" class="w-full bg-gray-50 border-2 border-draw-ink rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
        <option value="飲食">飲食</option>
        <option value="交通">交通</option>
        <option value="門票">門票</option>
        <option value="住宿">住宿</option>
        <option value="其他">其他</option>
      </select>
    </div>

    <div>
      <label class="block text-xs font-black text-draw-ink mb-2">📝 項目名稱 (Item)</label>
      <input type="text" id="inp-item" placeholder="例：敘敘苑壽司" class="w-full bg-gray-50 border-2 border-draw-ink rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
    </div>

    <div class="flex gap-3">
      <div class="flex-1">
        <label class="block text-xs font-black text-draw-ink mb-2">💰 總金額 (Amount)</label>
        <input type="number" id="inp-amount" placeholder="輸入數字" class="w-full bg-gray-50 border-2 border-draw-ink rounded-xl p-3 text-sm font-bold outline-none focus:bg-white" oninput="calculatePerHead()">
      </div>
      <div class="w-1/3">
        <label class="block text-xs font-black text-draw-ink mb-2">幣別</label>
        <select id="inp-currency" class="w-full bg-gray-50 border-2 border-draw-ink rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
          <option value="日幣">日幣</option>
          <option value="台幣">台幣</option>
        </select>
      </div>
    </div>

    <div class="flex gap-3">
      <div class="w-1/2">
        <label class="block text-xs font-black text-draw-ink mb-2">💳 代墊人 (Payer)</label>
        <select id="inp-payer" class="w-full bg-gray-50 border-2 border-draw-ink rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
          <option value="YUAN">YUAN</option>
          <option value="YUYU">YUYU</option>
          <option value="NICK">NICK</option>
          <option value="KINGSLEY">KINGSLEY</option>
          <option value="公費">公費</option>
        </select>
      </div>
      <div class="w-1/2">
        <label class="block text-xs font-black text-draw-ink mb-2">🧮 人均 (Cost per head)</label>
        <input type="number" id="inp-perhead" placeholder="自動÷6" class="w-full bg-yellow-50 border-2 border-draw-ink rounded-xl p-3 text-sm font-black outline-none text-draw-pink">
      </div>
    </div>

    <button id="submit-btn" onclick="submitExpense()" class="w-full bg-draw-pink text-white border-2 border-draw-ink shadow-solid-sm rounded-xl py-4 font-black text-base mt-2 click-effect">
      <i class="fa-solid fa-paper-plane mr-2"></i>送出至雲端帳本
    </button>
  </main>

  <div id="toast" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-draw-ink text-white text-sm font-black px-6 py-4 rounded-2xl shadow-solid opacity-0 pointer-events-none z-[60] flex items-center transition-opacity duration-300">
    <i class="fa-solid fa-check-circle text-draw-green mr-2 text-xl"></i> 寫入成功！
  </div>

<script>
    // ⚠️ 貼上你剛剛取得的「最新」Web App URL
    const SCRIPT_URL = "在此貼上你的_Web_App_URL"; 

    // 自動計算人均 (預設 ÷ 6)
    function calculatePerHead() {
        const amt = parseFloat(document.getElementById('inp-amount').value);
        if(!isNaN(amt)) {
            document.getElementById('inp-perhead').value = Math.round(amt / 6);
        } else {
            document.getElementById('inp-perhead').value = '';
        }
    }

    function submitExpense() {
        const category = document.getElementById('inp-category').value;
        const item = document.getElementById('inp-item').value.trim();
        const amount = document.getElementById('inp-amount').value;
        const currency = document.getElementById('inp-currency').value;
        const payer = document.getElementById('inp-payer').value;
        const perhead = document.getElementById('inp-perhead').value;

        if (!item || !amount) return alert("請輸入項目名稱與金額喔！");
        if (SCRIPT_URL === "https://script.google.com/macros/s/AKfycbyOxnbns2WDdgF8uXtkz2cd2KycdBXRSCxhGlUzErA1HyeE1Xjl6H6TR3YP0Zxl1zKL/exec") return alert("請先設定 Google Apps Script URL！");

        const btn = document.getElementById('submit-btn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>傳送中...';
        btn.disabled = true;
        btn.classList.replace('bg-draw-pink', 'bg-gray-400');

        // 改用 URLSearchParams (最穩定的表單傳送格式，不會被跨域擋下)
        const formData = new URLSearchParams();
        formData.append('category', category);
        formData.append('item', item);
        formData.append('amount', amount);
        formData.append('currency', currency);
        formData.append('payer', payer);
        formData.append('perhead', perhead);

        fetch(SCRIPT_URL, {
            method: "POST",
            body: formData
        })
        .then(response => {
            const toast = document.getElementById('toast');
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
                window.location.href = "index.html"; // 成功後跳回主頁
            }, 1500);
        })
        .catch(error => {
            alert("傳送失敗，請檢查網路連線。");
            btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-2"></i>送出至雲端帳本';
            btn.disabled = false;
            btn.classList.replace('bg-gray-400', 'bg-draw-pink');
        });
    }
  </script>
</body>
</html>
