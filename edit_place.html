<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>編輯地點 | Tokyo 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "M PLUS Rounded 1c", sans-serif; background-color: #FDFCF8; color: #2B2D42; }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(#E8E8E8 1.5px, transparent 1.5px); background-size: 24px 24px; z-index: -1; pointer-events: none; }
  </style>
</head>
<body class="min-h-screen p-4 relative z-10">
  <header class="flex items-center justify-between mb-6 pt-4">
    <div class="flex items-center">
        <a href="index.html" class="bg-white border-2 border-[#2B2D42] shadow-[2px_2px_0px_0px_#2B2D42] w-10 h-10 rounded-xl flex items-center justify-center text-[#2B2D42] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">
            <i class="fa-solid fa-chevron-left text-xl"></i>
        </a>
        <h1 class="text-xl font-black ml-4">編輯景點 / 美食</h1>
    </div>
    <button onclick="deletePlace()" class="bg-white border-2 border-[#2B2D42] shadow-[2px_2px_0px_0px_#2B2D42] w-10 h-10 rounded-xl flex items-center justify-center text-[#EF476F] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">
        <i class="fa-solid fa-trash-can"></i>
    </button>
  </header>

  <main class="bg-white border-2 border-[#2B2D42] shadow-[3px_3px_0px_0px_#2B2D42] rounded-2xl p-5 space-y-5">
    <input type="hidden" id="inp-row">
    <div>
      <label class="block text-xs font-black text-[#2B2D42] mb-2">📍 地點名稱</label>
      <input type="text" id="inp-title" class="w-full bg-gray-50 border-2 border-[#2B2D42] rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
    </div>
    <div class="flex gap-3">
        <div class="w-1/2">
            <label class="block text-xs font-black text-[#2B2D42] mb-2">🏷️ 分類</label>
            <select id="inp-category" class="w-full bg-gray-50 border-2 border-[#2B2D42] rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
                <option value="景點">景點</option><option value="美食">美食</option><option value="逛街">逛街</option><option value="其他">其他</option>
            </select>
        </div>
        <div class="w-1/2">
            <label class="block text-xs font-black text-[#2B2D42] mb-2">📅 預計在哪天？</label>
            <select id="inp-day" class="w-full bg-gray-50 border-2 border-[#2B2D42] rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
                <option value="">載入中...</option>
            </select>
        </div>
    </div>
    <div>
      <label class="block text-xs font-black text-[#2B2D42] mb-2">🗺️ Google Maps 連結</label>
      <input type="url" id="inp-maplink" class="w-full bg-gray-50 border-2 border-[#2B2D42] rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
    </div>
    <div class="flex gap-3">
        <div class="w-1/3">
            <label class="block text-xs font-black text-[#2B2D42] mb-2">⭐ Google評分</label>
            <input type="text" id="inp-rating" class="w-full bg-yellow-50 border-2 border-[#2B2D42] rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
        </div>
        <div class="w-2/3">
            <label class="block text-xs font-black text-[#2B2D42] mb-2">📝 補充 (營業時間/短評)</label>
            <input type="text" id="inp-notes" class="w-full bg-gray-50 border-2 border-[#2B2D42] rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
        </div>
    </div>
    <button id="submit-btn" onclick="updatePlace()" class="w-full bg-[#06D6A0] text-white border-2 border-[#2B2D42] shadow-[2px_2px_0px_0px_#2B2D42] rounded-xl py-4 font-black text-base mt-2 active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">
      <i class="fa-solid fa-floppy-disk mr-2"></i>儲存變更
    </button>
  </main>
  
  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOxnbns2WDdgF8uXtkz2cd2KycdBXRSCxhGlUzErA1HyeE1Xjl6H6TR3YP0Zxl1zKL/exec"; 
    const SHEET_ID = '16uetEwwxz6h9jG4iwl64O8KVmk7eFTIgQtOZ95R8Hmc';

    // 🔥 非同步載入網頁初始化資料 (包含選項填入)
    async function initPage() {
        const params = new URLSearchParams(window.location.search);
        const selectEl = document.getElementById('inp-day');
        
        // 1. 先去抓表單資料更新下拉選單
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=schedule&_=${new Date().getTime()}`;
            const res = await fetch(url);
            const txt = await res.text();
            const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1));
            
            let optionsHtml = '';
            json.table.rows.forEach(row => {
                if(row.c && row.c[0] && row.c[0].v !== null && row.c[1] && row.c[1].v !== null) {
                    let dayNum = String(row.c[0].v).trim();
                    let dayTitle = String(row.c[1].v).trim();
                    optionsHtml += `<option value="${dayNum}">Day ${dayNum} - ${dayTitle}</option>`;
                }
            });
            optionsHtml += `<option value="未分類">尚未決定</option>`;
            selectEl.innerHTML = optionsHtml;
        } catch (err) {
            selectEl.innerHTML = '<option value="1">Day 1</option><option value="2">Day 2</option><option value="未分類">尚未決定</option>';
        }

        // 2. 下拉選單長好之後，把網址上的舊資料自動填入對應的欄位
        if(params.has('row')) {
            document.getElementById('inp-row').value = params.get('row');
            document.getElementById('inp-title').value = params.get('title');
            document.getElementById('inp-category').value = params.get('cat') || '其他';
            
            // 設定 Day (如果選項中沒有，則選未分類)
            const dayVal = params.get('day');
            if(!Array.from(selectEl.options).some(opt => opt.value === dayVal) && dayVal) {
                selectEl.add(new Option(`Day ${dayVal}`, dayVal));
            }
            selectEl.value = dayVal || '未分類';
            
            document.getElementById('inp-maplink').value = params.get('link');
            document.getElementById('inp-rating').value = params.get('rating');
            document.getElementById('inp-notes').value = params.get('notes');
        }
    }

    window.onload = initPage;

    function sendRequest(action) {
        const title = document.getElementById('inp-title').value.trim();
        if (!title && action === 'update') return alert("名稱一定要填寫喔！");
        const btn = document.getElementById('submit-btn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>傳送中...'; btn.disabled = true;
        const params = new URLSearchParams({
            action: action, target_sheet: 'place', row: document.getElementById('inp-row').value,
            title: title, category: document.getElementById('inp-category').value, day: document.getElementById('inp-day').value,
            maplink: document.getElementById('inp-maplink').value.trim(),
            rating: document.getElementById('inp-rating').value.trim(),
            notes: document.getElementById('inp-notes').value.trim()
        });
        fetch(SCRIPT_URL + "?" + params.toString(), { method: 'GET', mode: 'no-cors' })
        .then(() => { setTimeout(() => { window.location.href = "index.html"; }, 1000); });
    }
    function updatePlace() { sendRequest('update'); }
    function deletePlace() { if(confirm('確定要刪除這個景點嗎？')) sendRequest('delete'); }
  </script>
</body>
</html>
