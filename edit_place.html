<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>編輯地點 | Tokyo 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"M PLUS Rounded 1c"', 'sans-serif'] },
          colors: { draw: { bg: '#FDFCF8', ink: '#2B2D42', yellow: '#FFD166', pink: '#EF476F', blue: '#118AB2', green: '#06D6A0', muted: '#6C757D' } },
          boxShadow: { 'solid': '3px 3px 0px 0px #2B2D42', 'solid-sm': '2px 2px 0px 0px #2B2D42' }
        }
      }
    }
  </script>
  <style>
    body { background-color: #FDFCF8; color: #2B2D42; }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(#E8E8E8 1.5px, transparent 1.5px); background-size: 24px 24px; z-index: -1; pointer-events: none; }
    .click-effect { transition: transform 0.1s, box-shadow 0.1s; }
    .click-effect:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px 0px #2B2D42 !important; }
  </style>
</head>
<body class="font-sans min-h-screen p-4 relative z-10">

  <header class="flex items-center justify-between mb-6 pt-4">
    <div class="flex items-center">
        <a href="index.html" class="bg-white border-2 border-draw-ink shadow-solid-sm w-10 h-10 rounded-xl flex items-center justify-center text-draw-ink click-effect">
            <i class="fa-solid fa-chevron-left text-xl"></i>
        </a>
        <h1 class="text-xl font-black ml-4">編輯景點 / 美食</h1>
    </div>
    <button onclick="deletePlace()" class="bg-white border-2 border-draw-ink shadow-solid-sm w-10 h-10 rounded-xl flex items-center justify-center text-draw-pink click-effect">
        <i class="fa-solid fa-trash-can"></i>
    </button>
  </header>

  <main class="bg-white border-2 border-draw-ink shadow-solid rounded-2xl p-5 space-y-5">
    <input type="hidden" id="inp-row"> <div>
      <label class="block text-xs font-black text-draw-ink mb-2">📍 地點名稱</label>
      <input type="text" id="inp-title" class="w-full bg-gray-50 border-2 border-draw-ink rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
    </div>

    <div class="flex gap-3">
        <div class="w-1/2">
            <label class="block text-xs font-black text-draw-ink mb-2">🏷️ 分類</label>
            <select id="inp-category" class="w-full bg-gray-50 border-2 border-draw-ink rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
                <option value="景點">景點</option><option value="美食">美食</option><option value="逛街">逛街</option><option value="其他">其他</option>
            </select>
        </div>
        <div class="w-1/2">
            <label class="block text-xs font-black text-draw-ink mb-2">📅 預計在哪天？</label>
            <select id="inp-day" class="w-full bg-gray-50 border-2 border-draw-ink rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
                <option value="1">Day 1</option><option value="2">Day 2</option><option value="3">Day 3</option><option value="4">Day 4</option><option value="5">Day 5</option><option value="6">Day 6</option><option value="未分類">尚未決定</option>
            </select>
        </div>
    </div>

    <div>
      <label class="block text-xs font-black text-draw-ink mb-2">🗺️ Google Maps 連結 (選填)</label>
      <input type="url" id="inp-maplink" class="w-full bg-gray-50 border-2 border-draw-ink rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
    </div>

    <div>
      <label class="block text-xs font-black text-draw-ink mb-2">⭐ 短評 / 備註 (選填)</label>
      <input type="text" id="inp-review" class="w-full bg-gray-50 border-2 border-draw-ink rounded-xl p-3 text-sm font-bold outline-none focus:bg-white">
    </div>

    <button id="submit-btn" onclick="updatePlace()" class="w-full bg-draw-green text-white border-2 border-draw-ink shadow-solid-sm rounded-xl py-4 font-black text-base mt-2 click-effect">
      <i class="fa-solid fa-floppy-disk mr-2"></i>儲存變更
    </button>
  </main>

  <div id="toast" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-draw-ink text-white text-sm font-black px-6 py-4 rounded-2xl shadow-solid opacity-0 pointer-events-none z-[60] flex items-center transition-opacity duration-300">
    <i class="fa-solid fa-check-circle text-draw-green mr-2 text-xl"></i> <span id="toast-msg">處理成功！</span>
  </div>

  <script>
    // ⚠️ 貼上你的 Web App URL
    const SCRIPT_URL = "在此貼上你的_Web_App_URL"; 

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if(params.has('row')) {
            document.getElementById('inp-row').value = params.get('row');
            document.getElementById('inp-title').value = params.get('title');
            
            const catSelect = document.getElementById('inp-category');
            const catVal = params.get('cat');
            if(!Array.from(catSelect.options).some(opt => opt.value === catVal) && catVal) {
                catSelect.add(new Option(catVal, catVal));
            }
            catSelect.value = catVal || '其他';

            document.getElementById('inp-day').value = params.get('day');
            document.getElementById('inp-maplink').value = params.get('link');
            document.getElementById('inp-review').value = params.get('rev');
        }
    };

    function sendRequest(action) {
        const title = document.getElementById('inp-title').value.trim();
        if (!title && action === 'update') return alert("名稱一定要填寫喔！");

        const btn = document.getElementById('submit-btn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>傳送中...';
        btn.disabled = true;

        const params = new URLSearchParams({
            action: action,
            target_sheet: 'place',
            row: document.getElementById('inp-row').value,
            title: title,
            category: document.getElementById('inp-category').value,
            day: document.getElementById('inp-day').value,
            maplink: document.getElementById('inp-maplink').value.trim(),
            review: document.getElementById('inp-review').value.trim()
        });

        fetch(SCRIPT_URL + "?" + params.toString(), { method: 'GET', mode: 'no-cors' })
        .then(() => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = action === 'delete' ? '已刪除！' : '修改成功！';
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => { window.location.href = "index.html"; }, 1500);
        });
    }

    function updatePlace() { sendRequest('update'); }
    function deletePlace() { if(confirm('確定要刪除這個景點嗎？')) sendRequest('delete'); }
  </script>
</body>
</html>
